<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer ring -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="url(#gradient)" stroke-width="2" filter="url(#glow)" opacity="0.5"/>
  
  <!-- Inner circle -->
  <circle cx="50" cy="50" r="35" fill="none" stroke="url(#gradient)" stroke-width="3" filter="url(#glow)"/>
  
  <!-- Core -->
  <circle cx="50" cy="50" r="20" fill="url(#gradient)" filter="url(#glow)" opacity="0.8"/>
  
  <!-- J -->
  <text x="50" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0a0a0f">J</text>
</svg>
